name: Sync new Sydecar content

on:
  schedule:
    - cron: "0 14 * * *"   # 7 AM PT / 10 AM ET daily
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Sync assets from sitemap
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python sync_assets.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html && echo "No new assets" && exit 0
          git add index.html
          COUNT=$(git diff --cached index.html | grep -c '^\+.*{ title:' || true)
          git commit -m "Add ${COUNT} new asset(s) from sydecar.io"
          git push
